<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi Fractions - ¡A Comer en Porciones!</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #27ae60; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Comic Sans MS', sans-serif; }
        #game-container { border: 6px solid #2ecc71; box-shadow: 0px 0px 25px #27ae60; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let yoshi;
let cursors;
let fruits;
let nest;
let score = 0;
let eggsUnlocked = 0;
let scoreText;
let eggText;
let missionText;
let stomachText;

let targetAmount = 0.5; 
let currentAmount = 0;   

function preload() {
    let graphics = this.make.graphics({ x: 0, y: 0, add: false });
    
    // YOSHI
    graphics.fillStyle(0x2ecc71, 1);
    graphics.fillCircle(16, 20, 12);
    graphics.fillCircle(22, 12, 8);  
    graphics.fillStyle(0xffffff, 1); 
    graphics.fillCircle(20, 10, 3);
    graphics.fillStyle(0xe74c3c, 1); 
    graphics.fillRect(6, 16, 6, 10);
    graphics.generateTexture('yoshi', 32, 32);

    // NIDO
    graphics.clear();
    graphics.fillStyle(0xd35400, 1); 
    graphics.fillEllipse(32, 40, 60, 20);
    graphics.fillStyle(0xf1c40f, 1); 
    graphics.fillCircle(32, 25, 12); 
    graphics.generateTexture('nest', 64, 64);

    // 1/4 MANZANA
    graphics.clear();
    graphics.fillStyle(0xe74c3c, 1);
    graphics.fillCircle(16, 18, 10);
    graphics.fillStyle(0x27ae60, 1); 
    graphics.fillRect(14, 4, 4, 6);
    graphics.generateTexture('item_quarter', 32, 32);

    // 1/2 SANDÍA
    graphics.clear();
    graphics.fillStyle(0x27ae60, 1); 
    graphics.fillSlice(16, 16, 14, 0, 180);
    graphics.fillStyle(0xc0392b, 1); 
    graphics.fillSlice(16, 16, 11, 0, 180);
    graphics.generateTexture('item_half', 32, 32);
}

function create() {
    this.cameras.main.setBackgroundColor('#7ed6df');

    missionText = this.add.text(20, 20, 'MISIÓN: Yoshi necesita comer exactamente 1/2', { fontSize: '20px', fill: '#2c3e50', fontWeight: 'bold' });
    stomachText = this.add.text(20, 55, 'Estómago: Vacío 🦖', { fontSize: '18px', fill: '#ffff' });
    scoreText = this.add.text(620, 20, 'Puntos: 0 🌟', { fontSize: '20px', fill: '#d35400', fontWeight: 'bold' });
    eggText = this.add.text(600, 50, 'Huevos: 0 🥚', { fontSize: '18px', fill: '#2980b9', fontWeight: 'bold' });

    nest = this.physics.add.sprite(400, 150, 'nest');
    nest.setImmovable(true);

    yoshi = this.physics.add.sprite(400, 450, 'yoshi');
    yoshi.setCollideWorldBounds(true);

    fruits = this.physics.add.group();
    spawnFruits(this);

    cursors = this.input.keyboard.createCursorKeys();

    this.physics.add.collider(yoshi, nest, deliverFood, null, this);
    this.physics.add.overlap(yoshi, fruits, eatFruit, null, this);
}

function update() {
    yoshi.setVelocity(0);
    if (cursors.left.isDown) { yoshi.setVelocityX(-280); }
    else if (cursors.right.isDown) { yoshi.setVelocityX(280); }
    if (cursors.up.isDown) { yoshi.setVelocityY(-280); }
    else if (cursors.down.isDown) { yoshi.setVelocityY(280); }
}

function spawnFruits(scene) {
    fruits.clear(true, true);
    for(let i=0; i<4; i++) {
        let fruit = fruits.create(Phaser.Math.Between(60, 740), Phaser.Math.Between(240, 540), 'item_quarter');
        fruit.setData('value', 0.25);
    }
    for(let i=0; i<3; i++) {
        let fruit = fruits.create(Phaser.Math.Between(60, 740), Phaser.Math.Between(240, 540), 'item_half');
        fruit.setData('value', 0.5);
    }
}

function eatFruit(yoshiPlayer, fruit) {
    let value = fruit.getData('value');
    currentAmount += value;
    
    this.add.particles(fruit.x, fruit.y, 'item_quarter', {
        speed: 40, scale: { start: 0.4, end: 0 }, lifespan: 300, count: 4
    });

    fruit.destroy();
    stomachText.setText('Estómago: ' + translateToFraction(currentAmount) + ' lleno');
}

function deliverFood(yoshiPlayer, targetNest) {
    if (currentAmount === 0) return;

    if (currentAmount === targetAmount) {
        score += 150;
        eggsUnlocked += 1;
        scoreText.setText('Puntos: ' + score + ' 🌟');
        eggText.setText('Huevos: ' + eggsUnlocked + ' 🥚');
        
        this.cameras.main.flash(400, 46, 204, 113);
        alert('¡Excelente! Yoshi digirió la cantidad exacta. ¡Ha puesto un huevo! 🥚🎉');
        setupNextMission();
    } else if (currentAmount > targetAmount) {
        this.cameras.main.shake(400, 0.04);
        alert('¡Cuidado! Comiste sin calcular y Yoshi tiene dolor de panza.');
    } else {
        alert('Aún falta comida para completar la porción exacta.');
        return; 
    }

    currentAmount = 0;
    stomachText.setText('Estómago: Vacío 🦖');
    spawnFruits(this);
}

function setupNextMission() {
    const levels = [
        { target: 0.75, text: 'MISIÓN: Yoshi necesita exactamente 3/4 de comida' },
        { target: 1.0,  text: 'MISIÓN: Consigue comida para formar 1 ENTERO' },
        { target: 0.5,  text: 'MISIÓN: Yoshi necesita exactamente 1/2' }
    ];
    let next = Phaser.Utils.Array.GetRandom(levels);
    targetAmount = next.target;
    missionText.setText(next.text);
}

function translateToFraction(decimal) {
    if (decimal === 0.25) return "1/4";
    if (decimal === 0.5) return "1/2";
    if (decimal === 0.75) return "3/4";
    if (decimal === 1) return "1 ENTERO";
    if (decimal > 1) return decimal + " (Demasiado)";
    return decimal;
}
</script>

</body>
</html>
