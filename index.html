<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🦖 Yoshi Fracciones - Immersive Edition</title>
  
  <!-- Tipografía moderna y amigable -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  
  <style>
    :root {
      --primary: #2ecc71;
      --primary-glow: rgba(46, 204, 113, 0.5);
      --secondary: #ffd740;
      --bg-dark: #070b09;
      --glass-bg: rgba(20, 35, 25, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      font-family: 'Baloo 2', cursive;
      overflow: hidden; touch-action: none;
      display: flex; justify-content: center; align-items: center;
      color: white;
    }

    /* ── CAPA VIGNETTE (Sombras en los bordes para inmersión) ── */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    }

    /* ── PANTALLA DE INICIO (Requiere interacción para Audio) ── */
    #welcome {
      position: fixed; inset: 0; z-index: 500;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #welcome h1 {
      font-size: 42px; font-weight: 800; color: var(--primary);
      text-shadow: 0 4px 20px var(--primary-glow);
      margin-bottom: 10px; text-align: center; line-height: 1.1;
    }
    #welcome p { font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    
    .btn-massive {
      background: linear-gradient(to bottom, #4cd137, #44bd32);
      border: 2px solid rgba(255,255,255,0.3);
      padding: 16px 40px; border-radius: 50px;
      font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; color: white;
      box-shadow: 0 10px 30px rgba(68, 189, 50, 0.4), inset 0 2px 0 rgba(255,255,255,0.4);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-massive:active { transform: scale(0.92); box-shadow: 0 4px 15px rgba(68, 189, 50, 0.4); }

    /* ── OVERLAY DE PLANIFICACIÓN (Glassmorphism) ── */
    #overlay {
      position: fixed; inset: 0; z-index: 300;
      background: radial-gradient(circle at top right, rgba(20,50,35,0.8), rgba(5,10,8,0.95));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; flex-direction: column; align-items: center; overflow-y: auto;
      padding: 30px 20px; gap: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }

    /* Tarjetas de UI */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 20px;
      width: 100%; max-width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
    }
    /* Brillo interno de la tarjeta */
    .card::before {
      content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: skewX(-20deg); animation: shine 6s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 20%, 100% { left: 200%; } }

    /* Encabezado Nivel */
    .badges { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
    .badge {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      padding: 4px 16px; border-radius: 30px; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .badge.green { color: var(--primary); background: rgba(46,204,113,0.15); border-color: var(--primary); }
    .badge.gold  { color: var(--secondary); background: rgba(255,215,0,0.15); border-color: var(--secondary); }

    /* Textos */
    .story { font-size: 17px; line-height: 1.4; text-align: center; color: #e0e0e0; font-weight: 500; }
    .emoji-big { font-size: 38px; display: block; text-align: center; margin-bottom: 5px; }
    
    .goal-box { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .goal-frac { font-size: 56px; font-weight: 800; color: var(--secondary); text-shadow: 0 0 25px rgba(255,215,0,0.5); line-height: 1; }
    .goal-txt { display: flex; flex-direction: column; }
    .goal-txt strong { font-size: 18px; color: var(--primary); }
    .goal-txt span { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* Sistema de Planificación Interactivo */
    .tiles-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .q-tile {
      width: 60px; height: 60px; border-radius: 16px;
      background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.3); font-weight: 800; font-size: 18px;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .q-tile span { font-size: 11px; font-weight: 500; opacity: 0.6; margin-top: -2px; }
    
    .q-tile.active {
      background: linear-gradient(135deg, #ff5252, #c62828);
      border-color: #ff8a80; color: white;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 20px rgba(229,57,53,0.5), inset 0 2px 0 rgba(255,255,255,0.3);
    }
    
    .divider { width: 2px; height: 60px; background: rgba(255,215,0,0.3); border-radius: 2px; }

    .feedback-msg {
      margin-top: 16px; text-align: center; font-size: 16px; font-weight: 700;
      padding: 12px; border-radius: 14px; transition: all 0.3s ease;
    }
    .feedback-msg.empty { opacity: 0; transform: translateY(10px); }
    .feedback-msg.error { background: rgba(255,215,0,0.1); color: var(--secondary); border: 1px solid rgba(255,215,0,0.3); opacity: 1; transform: translateY(0); }
    .feedback-msg.success { background: rgba(46,204,113,0.15); color: var(--primary); border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(46,204,113,0.2); opacity: 1; transform: translateY(0); }

    /* Phaser Canvas */
    #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    canvas { border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,1); }
  </style>
</head>
<body>

  <!-- Overlay Vignette y Contenedor del Juego -->
  <div id="vignette"></div>
  <div id="game-container"></div>

  <!-- PANTALLA DE BIENVENIDA -->
  <div id="welcome">
    <div style="font-size: 80px; margin-bottom: 10px; text-shadow: 0 10px 30px rgba(0,0,0,0.5);">🦖</div>
    <h1>YOSHI<br>FRACCIONES</h1>
    <p>¡Una aventura matemática 4K inmersiva!</p>
    <button class="btn-massive" onclick="startApp()">JUGAR AHORA</button>
  </div>

  <!-- OVERLAY PEDAGÓGICO DE PLANIFICACIÓN -->
  <div id="overlay">
    <div class="badges">
      <div class="badge green" id="badge-lvl">NIVEL 1</div>
      <div class="badge gold" id="badge-phase">PROPIAS</div>
    </div>

    <div class="card">
      <span class="emoji-big" id="story-emoji">🍕</span>
      <p class="story" id="story-txt">Yoshi tiene hambre.</p>
    </div>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
      <div class="goal-txt">
        <span>OBJETIVO EXACTO:</span>
        <strong id="goal-desc">2 piezas de 1/4</strong>
      </div>
      <div class="goal-frac" id="goal-frac">1/2</div>
    </div>

    <div class="card">
      <p style="text-align: center; color: var(--secondary); font-weight: 700; margin-bottom: 10px;">👇 Toca para armar tu plan:</p>
      <div class="tiles-container" id="tiles-container"></div>
      <div id="feedback-box" class="feedback-msg empty">Selecciona los cuartos</div>
    </div>

    <button id="btn-go" class="btn-massive" style="width: 100%; max-width: 400px; display: none; margin-top: 10px;" onclick="startGameplay()">
      🎮 ¡A RECOLECTAR!
    </button>
  </div>

<script>
/* ══════════════════════════════════════════════════════════
   1. SISTEMA DE AUDIO PROCEDURAL (Inmersión Total)
══════════════════════════════════════════════════════════ */
let ac = null;
const SFX = {};

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();

  const masterGain = ac.createGain();
  masterGain.gain.value = 0.035; 
  masterGain.connect(ac.destination);

  const freqs = [130.81, 164.81, 196.00, 246.94, 293.66];
  freqs.forEach((f, i) => {
    const osc = ac.createOscillator();
    osc.type = i % 2 === 0 ? 'triangle' : 'sine';
    osc.frequency.value = f;
    
    const lfo = ac.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.05 + (Math.random() * 0.05);
    const lfoGain = ac.createGain();
    lfoGain.gain.value = 1.5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.detune);
    lfo.start();
    
    const panner = ac.createStereoPanner();
    panner.pan.value = (Math.random() * 0.6) - 0.3;
    
    osc.connect(panner);
    panner.connect(masterGain);
    osc.start();
  });

  SFX.play = (type) => {
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);

    if (type === 'tile') {
      o.type = 'sine'; o.frequency.setValueAtTime(600, t);
      o.frequency.exponentialRampToValueAtTime(300, t + 0.1);
      g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      o.start(t); o.stop(t + 0.1);
    } 
    else if (type === 'pop') {
      o.type = 'sine'; o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(800, t + 0.1);
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      o.start(t); o.stop(t + 0.1);
    }
    else if (type === 'error') {
      o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t);
      o.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    }
    else if (type === 'win') {
      [523.25, 659.25, 783.99, 1046.50].forEach((freq, idx) => {
        const o2 = ac.createOscillator(); const g2 = ac.createGain();
        o2.type = 'square'; o2.frequency.value = freq;
        o2.connect(g2); g2.connect(ac.destination);
        const time = t + (idx * 0.1);
        g2.gain.setValueAtTime(0, time); g2.gain.linearRampToValueAtTime(0.05, time + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
        o2.start(time); o2.stop(time + 0.3);
      });
    }
  };
}

/* ══════════════════════════════════════════════════════════
   2. CONFIGURACIÓN DEL JUEGO Y NIVELES
══════════════════════════════════════════════════════════ */
const GW = 390, GH = 750;
let game = null;
let currentLvl = 0;
let planSelected = 0;

const LEVELS = [
  // FASE 1: PROPIAS
  { phase: 'PROPIAS', tgt: 0.25, lbl: '1/4', pieces: 1, max: 4, e: '😋', txt: 'A Yoshi se le antojó una rebanada. Necesita exactamente UN CUARTO.', fQ: 4, fH: 0 },
  { phase: 'PROPIAS', tgt: 0.50, lbl: '1/2', pieces: 2, max: 4, e: '🍕', txt: 'Ahora quiere la MITAD. ¿Cuántos cuartos forman una mitad?', fQ: 5, fH: 0 },
  { phase: 'PROPIAS', tgt: 0.75, lbl: '3/4', pieces: 3, max: 4, e: '🦖', txt: '¡Más hambre! Consigue TRES CUARTOS (3/4).', fQ: 5, fH: 0 },
  { phase: 'PROPIAS', tgt: 0.50, lbl: '1/2', pieces: 2, max: 4, e: '🍉', txt: '¡Apareció sandía grande (1/2)! Puedes comer una de 1/2 o dos de 1/4.', fQ: 3, fH: 2 },
  { phase: 'PROPIAS', tgt: 1.00, lbl: '1', pieces: 4, max: 4, e: '🏆', txt: '¡Un entero completo! Llenarás toda tu barra.', fQ: 3, fH: 3 },
  // FASE 2: IMPROPIAS
  { phase: 'IMPROPIAS', tgt: 1.25, lbl: '5/4', pieces: 5, max: 8, e: '🤯', txt: '¡Las fracciones pueden ser mayores a 1! 5/4 significa un entero completo más un cuarto extra.', fQ: 5, fH: 2 },
  { phase: 'IMPROPIAS', tgt: 1.50, lbl: '3/2', pieces: 6, max: 8, e: '🔥', txt: '3/2 es lo mismo que un entero y medio. ¿Cuántos cuartos necesitas para formar esto?', fQ: 4, fH: 3 },
  { phase: 'IMPROPIAS', tgt: 1.75, lbl: '7/4', pieces: 7, max: 8, e: '⚡', txt: 'Casi dos enteros. 7/4 requiere comer 7 piezas de un cuarto. ¡Mucho cuidado con pasarte!', fQ: 5, fH: 3 },
  { phase: 'IMPROPIAS', tgt: 2.00, lbl: '2', pieces: 8, max: 8, e: '👑', txt: '¡El festín épico! Dos enteros completos (8/4). Recolecta exactamente la cantidad correcta.', fQ: 4, fH: 4 }
];

/* ══════════════════════════════════════════════════════════
   3. LÓGICA DE UI DOM (HTML Overlay)
══════════════════════════════════════════════════════════ */
function startApp() {
  initAudio();
  document.getElementById('welcome').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('welcome').style.display = 'none';
    if (!game) initPhaser();
    else loadLevelUI();
  }, 800);
}

function loadLevelUI() {
  const lvl = LEVELS[currentLvl];
  planSelected = 0;
  
  document.getElementById('badge-lvl').textContent = `NIVEL ${currentLvl + 1}`;
  document.getElementById('badge-phase').textContent = lvl.phase;
  
  const bPhase = document.getElementById('badge-phase');
  if (lvl.phase === 'IMPROPIAS') { bPhase.className = 'badge gold'; }
  else { bPhase.className = 'badge green'; }

  document.getElementById('story-emoji').textContent = lvl.e;
  document.getElementById('story-txt').textContent = lvl.txt;
  
  document.getElementById('goal-frac').textContent = lvl.lbl;
  document.getElementById('goal-desc').textContent = lvl.pieces > 4 
    ? `¡Requiere MÁS de 1 entero!` 
    : `Exactamente ${lvl.pieces} pieza(s)`;

  const tc = document.getElementById('tiles-container');
  tc.innerHTML = '';
  for (let i = 0; i < lvl.max; i++) {
    if (i === 4 && lvl.max > 4) {
      const div = document.createElement('div'); div.className = 'divider'; tc.appendChild(div);
    }
    const tile = document.createElement('div');
    tile.className = 'q-tile';
    tile.innerHTML = `1/4<br><span>#${i+1}</span>`;
    tile.onclick = () => onTileClick(i, lvl.max);
    tc.appendChild(tile);
  }
  
  updateFeedback();
  document.getElementById('overlay').classList.add('visible');
}

function onTileClick(idx, max) {
  SFX.play('tile');
  if (idx + 1 === planSelected) planSelected = Math.max(0, planSelected - 1);
  else planSelected = Math.min(idx + 1, max);
  
  const tiles = document.querySelectorAll('.q-tile');
  tiles.forEach((t, i) => {
    if (i < planSelected) t.classList.add('active');
    else t.classList.remove('active');
  });
  
  updateFeedback();
}

function updateFeedback() {
  const lvl = LEVELS[currentLvl];
  const fb = document.getElementById('feedback-box');
  const btn = document.getElementById('btn-go');
  
  if (planSelected === 0) {
    fb.className = 'feedback-msg empty'; fb.textContent = ''; btn.style.display = 'none';
  } else if (planSelected === lvl.pieces) {
    fb.className = 'feedback-msg success'; 
    fb.textContent = `¡EXCELENTE! ${planSelected}/4 es igual a ${lvl.lbl}.`;
    btn.style.display = 'block';
    btn.animate([{transform:'scale(1)'},{transform:'scale(1.05)'},{transform:'scale(1)'}], {duration: 600});
  } else {
    fb.className = 'feedback-msg error';
    fb.textContent = `Tienes ${planSelected}/4. Sigue ajustando para llegar a ${lvl.lbl}.`;
    btn.style.display = 'none';
  }
}

function startGameplay() {
  SFX.play('tile');
  document.getElementById('overlay').classList.remove('visible');
  if (game && game.scene.isActive('Game')) {
    game.scene.getScene('Game').startLevel(LEVELS[currentLvl], planSelected);
  }
}

/* ══════════════════════════════════════════════════════════
   4. PHASER 3 - GRÁFICOS Y LÓGICA (Asset Loading + Game)
══════════════════════════════════════════════════════════ */

// Truco avanzado para cargar imágenes locales sin CORS en HTML nativo
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  
  preload() {
    this.add.text(GW/2, GH/2, 'Cargando Assets...', { fontFamily: 'Baloo 2', color:'#fff', fontSize:'30px', fontWeight: '800' }).setOrigin(0.5);
  }
  
  create() {
    // Estas son las imágenes AAA generadas y la foto original del usuario
    const assets = [
      { key: 'bg', src: 'bg.png' },
      { key: 'pizza', src: 'pizza.png' },
      { key: 'watermelon', src: 'watermelon.png' },
      { key: 'nest', src: 'nest.png' },
      { key: 'yoshi', src: 'yoshi.png' }
    ];
    let loaded = 0;
    
    assets.forEach(a => {
      const img = new Image();
      img.crossOrigin = "Anonymous"; // Intento preventivo
      img.onload = () => {
        if(!this.textures.exists(a.key)) this.textures.addImage(a.key, img);
        loaded++;
        if(loaded === assets.length) this.finishLoading();
      };
      img.onerror = () => {
        console.warn("Faltan assets, dibujando placeholder para: " + a.key);
        // Fallback procedural en caso de fallo (para evitar pantalla negra total)
        const g = this.make.graphics({add:false});
        g.fillStyle(0xffffff, 1); g.fillRect(0,0,64,64);
        g.generateTexture(a.key, 64, 64); g.destroy();
        loaded++;
        if(loaded === assets.length) this.finishLoading();
      };
      img.src = a.src;
    });
  }

  finishLoading() {
    // Generador de texturas procedurales auxiliares (partículas y luces)
    const mk = (key, w, h, drawFn) => {
      if(!this.textures.exists(key)){
        const g = this.make.graphics({add:false});
        drawFn(g); g.generateTexture(key, w, h); g.destroy();
      }
    };
    mk('glow', 128, 128, g => {
      for(let i=0; i<32; i++) {
        const alpha = 0.05 * (1 - (i/32));
        g.fillStyle(0xffffff, alpha);
        g.fillCircle(64, 64, 64 - i*2);
      }
    });
    mk('particle', 16, 16, g => {
      g.fillStyle(0xffffff, 1); g.fillCircle(8, 8, 8);
    });

    loadLevelUI(); // Carga la UI del primer nivel
    this.scene.start('Game');
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.createEnvironment();
    this.createHUD();
    this.createEntities();
    this.setupInput();

    this.isPaused = true;
    this.collectedVal = 0;
    this.targetVal = 0;
  }

  createEnvironment() {
    // Fondo AAA 
    this.add.image(GW/2, GH/2, 'bg').setDisplaySize(GW, GH).setDepth(0);
  }

  createHUD() {
    const topBar = this.add.graphics().setDepth(100);
    topBar.fillStyle(0x000000, 0.6); topBar.fillRoundedRect(10, 10, GW-20, 50, 16);
    
    this.hudGoal = this.add.text(GW/2, 35, 'Meta: 0/4', {
      fontFamily: 'Baloo 2', fontSize: '24px', fontStyle: '800', color: '#ffd740', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5).setDepth(101);

    const botBar = this.add.graphics().setDepth(100);
    botBar.fillStyle(0x000000, 0.4); botBar.fillRoundedRect(GW/2 - 100, GH - 40, 200, 30, 10);
    this.add.text(GW/2, GH - 25, 'Arrastra para mover', {
      fontFamily: 'Baloo 2', fontSize: '14px', fontStyle: '600', color: '#ffffff', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5).setDepth(101);
  }

  createEntities() {
    // Nido (Render AAA)
    this.nestX = GW/2; this.nestY = 320;
    this.nest = this.add.image(this.nestX, this.nestY, 'nest').setDisplaySize(160, 140).setDepth(20);
    
    // Luz volumétrica
    this.nestLight = this.add.image(this.nestX, this.nestY - 100, 'glow')
      .setDisplaySize(180, 400).setTint(0x2ecc71).setAlpha(0)
      .setBlendMode('ADD').setDepth(19);

    // Yoshi (Imagen Oficial del Usuario)
    this.yoshi = this.physics.add.sprite(GW/2, GH - 150, 'yoshi').setDepth(30);
    // Ajustar a un tamaño ideal
    this.yoshi.setDisplaySize(100, 110);
    // La hitbox se reduce para ser un punto de colisión muy preciso
    this.yoshi.setSize(this.yoshi.width * 0.4, this.yoshi.height * 0.4); 
    this.yoshi.setOffset(this.yoshi.width * 0.3, this.yoshi.height * 0.3);
    
    this.yoshi.setCollideWorldBounds(true);
    this.physics.world.setBounds(10, 280, GW-20, GH-290);
    
    // Animación procedural de Yoshi caminando
    this.yoshiBob = this.tweens.add({
      targets: this.yoshi, y: '+=8', angle: {from:-3, to:3}, duration: 180, yoyo: true, repeat: -1, ease: 'Sine.inOut'
    });
    this.yoshiBob.pause();

    this.dustGrp = this.add.particles(0,0,'particle', {
      scale: {start:0.5, end:0}, alpha: {start:0.5, end:0},
      lifespan: 400, speed: 20, emitting: false, tint: 0xffffff
    }).setDepth(29);

    this.foodGroup = this.physics.add.group();
    this.physics.add.overlap(this.yoshi, this.foodGroup, this.onCollect, null, this);
  }

  setupInput() {
    this.input.addPointer(2);
    
    this.input.on('pointermove', (ptr) => {
      if(this.isPaused || !ptr.isDown) return;
      this.physics.moveToObject(this.yoshi, {x: ptr.x, y: ptr.y - 60}, 300);
    });

    this.input.on('pointerup', () => {
      this.yoshi.setVelocity(0,0);
    });
    this.keys = this.input.keyboard.createCursorKeys();
  }

  startLevel(lvlObj, playerPlanQty) {
    this.isPaused = false;
    this.targetVal = lvlObj.tgt;
    this.collectedVal = 0;
    
    this.hudGoal.setText(`Meta: ${lvlObj.lbl}`);
    this.hudGoal.setColor('#ffd740');
    this.nestLight.setAlpha(0);

    this.yoshi.setPosition(GW/2, GH-100);
    this.yoshi.setVelocity(0,0);
    
    if (this.foodObjs) {
      this.foodObjs.forEach(f => {
        if(f.glow) f.glow.destroy();
        if(f.lbl) f.lbl.destroy();
        f.sprite.destroy();
      });
    }
    this.foodGroup.clear(true, true);
    this.foodObjs = []; 

    const spawnFoodObj = (val, tex, labelStr) => {
      let px, py, valid = false;
      for(let i=0; i<20; i++){
        px = Phaser.Math.Between(50, GW-50); py = Phaser.Math.Between(420, GH-120);
        if (Math.hypot(px-this.nestX, py-this.nestY) > 130) { valid = true; break; }
      }
      if(!valid) return;

      const bodySprite = this.foodGroup.create(px, py, tex).setAlpha(0);
      bodySprite.setSize(20, 20);
      bodySprite.setData('val', val);
      bodySprite.setData('lblStr', labelStr);
      bodySprite.collected = false;

      // Usar los Renders AAA generados
      const visual = this.add.image(px, py, tex).setDisplaySize(70,70).setDepth(25);
      // Sombras bajo la comida para maximo profesionalismo
      const shadow = this.add.ellipse(px, py+35, 40, 10, 0x000000, 0.4).setDepth(23);
      
      const glow = this.add.image(px, py, 'glow').setBlendMode('ADD').setTint(val===0.5?0x2ecc71:0xffd740).setDepth(24).setAlpha(0.6);
      const lbl = this.add.text(px, py-45, labelStr, { fontFamily:'Baloo 2', fontSize:'22px', fontStyle:'800', stroke:'#000', strokeThickness:5}).setOrigin(0.5).setDepth(26);

      this.tweens.add({
        targets: [visual, glow, lbl], y: '-=15', duration: 1200 + Math.random()*400, yoyo: true, repeat: -1, ease: 'Sine.inOut'
      });

      this.foodObjs.push({ sprite: bodySprite, visual, glow, lbl, shadow, baseX: px, baseY: py });
    };

    for(let i=0; i<lvlObj.fQ; i++) spawnFoodObj(0.25, 'pizza', '1/4');
    for(let i=0; i<lvlObj.fH; i++) spawnFoodObj(0.50, 'watermelon', '1/2');
    
    this.cameras.main.setZoom(1.1);
    this.tweens.add({targets: this.cameras.main, zoom: 1, duration: 600, ease: 'Cubic.out'});
  }

  onCollect(yoshi, bodySprite) {
    if (this.isPaused || bodySprite.collected) return;
    bodySprite.collected = true; 
    
    const fObj = this.foodObjs.find(o => o.sprite === bodySprite);
    if (!fObj) return;

    this.isPaused = true;
    yoshi.setVelocity(0,0);
    this.yoshiBob.pause();
    
    SFX.play('pop');
    this.cameras.main.shake(80, 0.005);

    const tongue = this.add.graphics().setDepth(28);
    // IMPORTANTE: Dado que yoshi mira a la izquierda nativamente:
    // Si flipX es false, mira a la IZQUIERDA. Si flipX es true, mira a la DERECHA.
    const mouthX = yoshi.x + (yoshi.flipX ? 25 : -25);
    const mouthY = yoshi.y - 15;
    
    this.tweens.addCounter({
      from: 0, to: 1, duration: 50,
      onUpdate: (tw) => {
        tongue.clear(); tongue.lineStyle(8, 0xff5252, 1);
        tongue.strokeLineShape(new Phaser.Geom.Line(mouthX, mouthY, 
          Phaser.Math.Linear(mouthX, fObj.visual.x, tw.getValue()), 
          Phaser.Math.Linear(mouthY, fObj.visual.y, tw.getValue())
        ));
      },
      onComplete: () => {
        fObj.visual.destroy(); fObj.glow.destroy(); fObj.lbl.destroy(); fObj.shadow.destroy();
        bodySprite.destroy();
        
        const ft = this.add.text(mouthX, mouthY-30, `+${bodySprite.getData('lblStr')}`, {fontFamily:'Baloo 2', fontSize:'30px', color:'#2ecc71', fontStyle:'800', stroke:'#000', strokeThickness:6}).setOrigin(0.5).setDepth(50);
        this.tweens.add({targets: ft, y: mouthY-90, alpha: 0, duration: 800, onComplete:()=>ft.destroy()});
        
        const sp = this.add.particles(mouthX, mouthY, 'particle', { speed: 100, scale: {start:0.6, end:0}, lifespan: 300, quantity: 12, tint: 0xffd740 }).setDepth(40);
        this.time.delayedCall(400, () => sp.destroy());

        this.tweens.addCounter({
          from: 1, to: 0, duration: 50,
          onUpdate: (tw) => {
            tongue.clear(); tongue.lineStyle(8, 0xff5252, 1);
            tongue.strokeLineShape(new Phaser.Geom.Line(mouthX, mouthY, 
              Phaser.Math.Linear(mouthX, fObj.baseX, tw.getValue()), 
              Phaser.Math.Linear(mouthY, fObj.baseY, tw.getValue())
            ));
          },
          onComplete: () => {
            tongue.destroy();
            this.isPaused = false;
            this.collectedVal = Math.round((this.collectedVal + bodySprite.getData('val')) * 1000) / 1000;
            this.checkStatus();
          }
        });
      }
    });
  }

  checkStatus() {
    const diff = this.targetVal - this.collectedVal;
    const txtC = this.collectedVal === 0 ? '0' : this.collectedVal.toString();
    this.hudGoal.setText(`Llevas: ${txtC}  |  Meta: ${LEVELS[currentLvl].lbl}`);

    if (Math.abs(diff) < 0.001) {
      this.hudGoal.setColor('#2ecc71');
      this.hudGoal.setText('¡PERFECTO! Llévalo al nido ▲');
      this.tweens.add({targets: this.nestLight, alpha: 0.9, duration: 400, yoyo: true, repeat: -1});
    } else if (diff < 0) {
      this.isPaused = true;
      this.yoshi.setVelocity(0,0);
      SFX.play('error');
      this.cameras.main.shake(400, 0.02);
      this.cameras.main.flash(200, 255, 0, 0);
      this.hudGoal.setColor('#ff5252');
      this.hudGoal.setText('¡Te pasaste! Dolor de panza 🤢');
      
      this.time.delayedCall(1500, () => this.startLevel(LEVELS[currentLvl], planSelected));
    }
  }

  update() {
    if (this.isPaused) {
      this.yoshiBob.pause();
      this.yoshi.angle = 0;
      return;
    }

    if(this.keys.left.isDown) this.yoshi.setVelocityX(-250);
    else if(this.keys.right.isDown) this.yoshi.setVelocityX(250);
    if(this.keys.up.isDown) this.yoshi.setVelocityY(-250);
    else if(this.keys.down.isDown) this.yoshi.setVelocityY(250);

    const speed = Math.hypot(this.yoshi.body.velocity.x, this.yoshi.body.velocity.y);
    
    // YOSHI CORRECCIÓN DE DIRECCIÓN (La imagen original mira a la izquierda)
    if (this.yoshi.body.velocity.x < -10) this.yoshi.setFlipX(false);
    else if (this.yoshi.body.velocity.x > 10) this.yoshi.setFlipX(true);

    if (speed > 10) {
      if(!this.yoshiBob.isPlaying()) this.yoshiBob.resume();
      this.dustGrp.emitParticleAt(this.yoshi.x, this.yoshi.y + 40);
    } else {
      this.yoshiBob.pause();
      this.yoshi.angle = 0;
      this.yoshi.y = Phaser.Math.Linear(this.yoshi.y, this.yoshi.body.y + 50, 0.1);
    }

    this.foodObjs.forEach(f => {
      if(f.sprite.active) {
        f.sprite.setPosition(f.visual.x, f.visual.y); // Acoplar hitbox a visual
      }
    });

    if (Math.abs(this.targetVal - this.collectedVal) < 0.001) {
      const distToNest = Math.hypot(this.yoshi.x - this.nestX, this.yoshi.y - this.nestY);
      if (distToNest < 80) this.winLevel();
    }
  }

  winLevel() {
    this.isPaused = true;
    this.yoshi.setVelocity(0,0);
    this.yoshi.angle = 0;
    SFX.play('win');
    
    this.cameras.main.flash(400, 46, 204, 113);
    this.hudGoal.setText('¡NIVEL COMPLETADO! 🎉');
    
    const emit = this.add.particles(GW/2, GH, 'particle', {
      speed: {min: 300, max: 800}, angle: {min: 240, max: 300},
      gravityY: 1000, scale: {start: 1, end: 0}, lifespan: 2500,
      tint: [0x2ecc71, 0xffd740, 0xff5252, 0x4fc3f7], quantity: 4
    }).setDepth(200);
    
    this.time.delayedCall(800, () => emit.stop());

    this.time.delayedCall(2500, () => {
      currentLvl = (currentLvl + 1) % LEVELS.length;
      loadLevelUI();
    });
  }
}

function initPhaser() {
  game = new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-container',
    transparent: true,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: GW, height: GH },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [BootScene, GameScene]
  });
}
</script>
