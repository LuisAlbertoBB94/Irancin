<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🦖 Yoshi Fracciones - Immersive Edition</title>
  
  <!-- Tipografía moderna y amigable -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  
  <style>
    :root {
      --primary: #2ecc71;
      --primary-glow: rgba(46, 204, 113, 0.5);
      --secondary: #ffd740;
      --bg-dark: #070b09;
      --glass-bg: rgba(20, 35, 25, 0.65);
      --glass-border: rgba(255, 255, 255, 0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      font-family: 'Baloo 2', cursive;
      overflow: hidden; touch-action: none;
      display: flex; justify-content: center; align-items: center;
      color: white;
    }

    /* ── CAPA VIGNETTE (Sombras en los bordes para inmersión) ── */
    #vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 100;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    }

    /* ── PANTALLA DE INICIO (Requiere interacción para Audio) ── */
    #welcome {
      position: fixed; inset: 0; z-index: 500;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.8s ease;
    }
    #welcome h1 {
      font-size: 42px; font-weight: 800; color: var(--primary);
      text-shadow: 0 4px 20px var(--primary-glow);
      margin-bottom: 10px; text-align: center; line-height: 1.1;
    }
    #welcome p { font-size: 18px; color: rgba(255,255,255,0.7); margin-bottom: 40px; }
    
    .btn-massive {
      background: linear-gradient(to bottom, #4cd137, #44bd32);
      border: 2px solid rgba(255,255,255,0.3);
      padding: 16px 40px; border-radius: 50px;
      font-family: 'Baloo 2', cursive; font-size: 24px; font-weight: 800; color: white;
      box-shadow: 0 10px 30px rgba(68, 189, 50, 0.4), inset 0 2px 0 rgba(255,255,255,0.4);
      cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-massive:active { transform: scale(0.92); box-shadow: 0 4px 15px rgba(68, 189, 50, 0.4); }

    /* ── OVERLAY DE PLANIFICACIÓN (Glassmorphism) ── */
    #overlay {
      position: fixed; inset: 0; z-index: 300;
      background: radial-gradient(circle at top right, rgba(20,50,35,0.8), rgba(5,10,8,0.95));
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      display: flex; flex-direction: column; align-items: center; overflow-y: auto;
      padding: 30px 20px; gap: 16px;
      opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    }
    #overlay.visible { opacity: 1; pointer-events: all; }

    /* Tarjetas de UI */
    .card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 20px;
      width: 100%; max-width: 400px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
    }
    /* Brillo interno de la tarjeta */
    .card::before {
      content: ""; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transform: skewX(-20deg); animation: shine 6s infinite;
    }
    @keyframes shine { 0% { left: -100%; } 20%, 100% { left: 200%; } }

    /* Encabezado Nivel */
    .badges { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
    .badge {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      padding: 4px 16px; border-radius: 30px; font-size: 13px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .badge.green { color: var(--primary); background: rgba(46,204,113,0.15); border-color: var(--primary); }
    .badge.gold  { color: var(--secondary); background: rgba(255,215,0,0.15); border-color: var(--secondary); }

    /* Textos */
    .story { font-size: 17px; line-height: 1.4; text-align: center; color: #e0e0e0; font-weight: 500; }
    .emoji-big { font-size: 38px; display: block; text-align: center; margin-bottom: 5px; }
    
    .goal-box { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .goal-frac { font-size: 56px; font-weight: 800; color: var(--secondary); text-shadow: 0 0 25px rgba(255,215,0,0.5); line-height: 1; }
    .goal-txt { display: flex; flex-direction: column; }
    .goal-txt strong { font-size: 18px; color: var(--primary); }
    .goal-txt span { font-size: 14px; color: rgba(255,255,255,0.5); }

    /* Sistema de Planificación Interactivo */
    .tiles-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    .q-tile {
      width: 60px; height: 60px; border-radius: 16px;
      background: rgba(0,0,0,0.4); border: 2px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.3); font-weight: 800; font-size: 18px;
      cursor: pointer; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    .q-tile span { font-size: 11px; font-weight: 500; opacity: 0.6; margin-top: -2px; }
    
    .q-tile.active {
      background: linear-gradient(135deg, #ff5252, #c62828);
      border-color: #ff8a80; color: white;
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 20px rgba(229,57,53,0.5), inset 0 2px 0 rgba(255,255,255,0.3);
    }
    
    .divider { width: 2px; height: 60px; background: rgba(255,215,0,0.3); border-radius: 2px; }

    .feedback-msg {
      margin-top: 16px; text-align: center; font-size: 16px; font-weight: 700;
      padding: 12px; border-radius: 14px; transition: all 0.3s ease;
    }
    .feedback-msg.empty { opacity: 0; transform: translateY(10px); }
    .feedback-msg.error { background: rgba(255,215,0,0.1); color: var(--secondary); border: 1px solid rgba(255,215,0,0.3); opacity: 1; transform: translateY(0); }
    .feedback-msg.success { background: rgba(46,204,113,0.15); color: var(--primary); border: 1px solid var(--primary); box-shadow: 0 0 20px rgba(46,204,113,0.2); opacity: 1; transform: translateY(0); }

    /* Phaser Canvas */
    #game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    canvas { border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,1); }
  </style>
</head>
<body>

  <!-- Overlay Vignette y Contenedor del Juego -->
  <div id="vignette"></div>
  <div id="game-container"></div>

  <!-- PANTALLA DE BIENVENIDA (Inicializa AudioContext) -->
  <div id="welcome">
    <div style="font-size: 80px; margin-bottom: 10px; text-shadow: 0 10px 30px rgba(0,0,0,0.5);">🦕</div>
    <h1>YOSHI<br>FRACCIONES</h1>
    <p>¡Una aventura matemática inmersiva!</p>
    <button class="btn-massive" onclick="startApp()">JUGAR AHORA</button>
  </div>

  <!-- OVERLAY PEDAGÓGICO DE PLANIFICACIÓN -->
  <div id="overlay">
    <div class="badges">
      <div class="badge green" id="badge-lvl">NIVEL 1</div>
      <div class="badge gold" id="badge-phase">PROPIAS</div>
    </div>

    <div class="card">
      <span class="emoji-big" id="story-emoji">🍕</span>
      <p class="story" id="story-txt">Yoshi tiene hambre.</p>
    </div>

    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
      <div class="goal-txt">
        <span>OBJETIVO EXACTO:</span>
        <strong id="goal-desc">2 piezas de 1/4</strong>
      </div>
      <div class="goal-frac" id="goal-frac">1/2</div>
    </div>

    <div class="card">
      <p style="text-align: center; color: var(--secondary); font-weight: 700; margin-bottom: 10px;">👇 Toca para armar tu plan:</p>
      <div class="tiles-container" id="tiles-container"></div>
      <div id="feedback-box" class="feedback-msg empty">Selecciona los cuartos</div>
    </div>

    <button id="btn-go" class="btn-massive" style="width: 100%; max-width: 400px; display: none; margin-top: 10px;" onclick="startGameplay()">
      🎮 ¡A RECOLECTAR!
    </button>
  </div>

<script>
/* ══════════════════════════════════════════════════════════
   1. SISTEMA DE AUDIO PROCEDURAL (Inmersión Total)
══════════════════════════════════════════════════════════ */
let ac = null;
const SFX = {};

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();

  // BGM: Drone ambiental hermoso (Sintetizador Pad)
  const masterGain = ac.createGain();
  masterGain.gain.value = 0.035; // Volumen suave
  masterGain.connect(ac.destination);

  // Acorde maj9 cálido (C, E, G, B, D) bajado de octavas
  const freqs = [130.81, 164.81, 196.00, 246.94, 293.66];
  freqs.forEach((f, i) => {
    const osc = ac.createOscillator();
    osc.type = i % 2 === 0 ? 'triangle' : 'sine';
    osc.frequency.value = f;
    
    // LFO para movimiento lento de fase/pitch
    const lfo = ac.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.05 + (Math.random() * 0.05);
    const lfoGain = ac.createGain();
    lfoGain.gain.value = 1.5;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.detune);
    lfo.start();
    
    // Paneo suave para estéreo envolvente
    const panner = ac.createStereoPanner();
    panner.pan.value = (Math.random() * 0.6) - 0.3;
    
    osc.connect(panner);
    panner.connect(masterGain);
    osc.start();
  });

  // Generador de SFX
  SFX.play = (type) => {
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);

    if (type === 'tile') {
      // Sonido tipo marimba de madera
      o.type = 'sine'; o.frequency.setValueAtTime(600, t);
      o.frequency.exponentialRampToValueAtTime(300, t + 0.1);
      g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      o.start(t); o.stop(t + 0.1);
    } 
    else if (type === 'pop') {
      // Burbuja suave al recolectar
      o.type = 'sine'; o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(800, t + 0.1);
      g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      o.start(t); o.stop(t + 0.1);
    }
    else if (type === 'error') {
      o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t);
      o.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t + 0.3);
      o.start(t); o.stop(t + 0.3);
    }
    else if (type === 'win') {
      // Arpegio brillante
      [523.25, 659.25, 783.99, 1046.50].forEach((freq, idx) => {
        const o2 = ac.createOscillator(); const g2 = ac.createGain();
        o2.type = 'square'; o2.frequency.value = freq;
        o2.connect(g2); g2.connect(ac.destination);
        const time = t + (idx * 0.1);
        g2.gain.setValueAtTime(0, time); g2.gain.linearRampToValueAtTime(0.05, time + 0.02);
        g2.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
        o2.start(time); o2.stop(time + 0.3);
      });
    }
  };
}

/* ══════════════════════════════════════════════════════════
   2. CONFIGURACIÓN DEL JUEGO Y NIVELES
══════════════════════════════════════════════════════════ */
const GW = 390, GH = 750; // Orientación móvil vertical estricta
let game = null;
let currentLvl = 0;
let planSelected = 0;

const LEVELS = [
  // FASE 1: PROPIAS
  { phase: 'PROPIAS', tgt: 0.25, lbl: '1/4', pieces: 1, max: 4, e: '😋', txt: 'A Yoshi se le antojó una rebanada. Necesita exactamente UN CUARTO de pizza.', fQ: 4, fH: 0 },
  { phase: 'PROPIAS', tgt: 0.50, lbl: '1/2', pieces: 2, max: 4, e: '🍕', txt: 'Ahora quiere la MITAD de una pizza entera. ¿Cuántos cuartos forman una mitad?', fQ: 5, fH: 0 },
  { phase: 'PROPIAS', tgt: 0.75, lbl: '3/4', pieces: 3, max: 4, e: '🦖', txt: '¡Más hambre! Consigue TRES CUARTOS (3/4). Planea las piezas con cuidado.', fQ: 5, fH: 0 },
  { phase: 'PROPIAS', tgt: 0.50, lbl: '1/2', pieces: 2, max: 4, e: '🍉', txt: '¡Apareció sandía grande (1/2)! Puedes comer una de 1/2 o dos de 1/4. Ambas son válidas.', fQ: 3, fH: 2 },
  { phase: 'PROPIAS', tgt: 1.00, lbl: '1', pieces: 4, max: 4, e: '🏆', txt: '¡Un entero completo! Llenarás toda tu barra. Combina piezas como quieras para llegar a 1.', fQ: 3, fH: 3 },
  // FASE 2: IMPROPIAS
  { phase: 'IMPROPIAS', tgt: 1.25, lbl: '5/4', pieces: 5, max: 8, e: '🤯', txt: '¡Las fracciones pueden ser mayores a 1! 5/4 significa un entero completo más un cuarto extra.', fQ: 5, fH: 2 },
  { phase: 'IMPROPIAS', tgt: 1.50, lbl: '3/2', pieces: 6, max: 8, e: '🔥', txt: '3/2 es lo mismo que un entero y medio. ¿Cuántos cuartos necesitas para formar esto?', fQ: 4, fH: 3 },
  { phase: 'IMPROPIAS', tgt: 1.75, lbl: '7/4', pieces: 7, max: 8, e: '⚡', txt: 'Casi dos enteros. 7/4 requiere comer 7 piezas de un cuarto. ¡Mucho cuidado con pasarte!', fQ: 5, fH: 3 },
  { phase: 'IMPROPIAS', tgt: 2.00, lbl: '2', pieces: 8, max: 8, e: '👑', txt: '¡El festín épico! Dos enteros completos (8/4). Recolecta exactamente la cantidad correcta.', fQ: 4, fH: 4 }
];

/* ══════════════════════════════════════════════════════════
   3. LÓGICA DE UI DOM (HTML Overlay)
══════════════════════════════════════════════════════════ */
function startApp() {
  initAudio();
  document.getElementById('welcome').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('welcome').style.display = 'none';
    if (!game) initPhaser();
    loadLevelUI();
  }, 800);
}

function loadLevelUI() {
  const lvl = LEVELS[currentLvl];
  planSelected = 0;
  
  document.getElementById('badge-lvl').textContent = `NIVEL ${currentLvl + 1}`;
  document.getElementById('badge-phase').textContent = lvl.phase;
  
  const bPhase = document.getElementById('badge-phase');
  if (lvl.phase === 'IMPROPIAS') { bPhase.className = 'badge gold'; }
  else { bPhase.className = 'badge green'; }

  document.getElementById('story-emoji').textContent = lvl.e;
  document.getElementById('story-txt').textContent = lvl.txt;
  
  document.getElementById('goal-frac').textContent = lvl.lbl;
  document.getElementById('goal-desc').textContent = lvl.pieces > 4 
    ? `¡Requiere MÁS de 1 entero!` 
    : `Exactamente ${lvl.pieces} pieza(s)`;

  // Generar Tiles
  const tc = document.getElementById('tiles-container');
  tc.innerHTML = '';
  for (let i = 0; i < lvl.max; i++) {
    if (i === 4 && lvl.max > 4) {
      const div = document.createElement('div'); div.className = 'divider'; tc.appendChild(div);
    }
    const tile = document.createElement('div');
    tile.className = 'q-tile';
    tile.innerHTML = `1/4<br><span>#${i+1}</span>`;
    tile.onclick = () => onTileClick(i, lvl.max);
    tc.appendChild(tile);
  }
  
  updateFeedback();
  document.getElementById('overlay').classList.add('visible');
}

function onTileClick(idx, max) {
  SFX.play('tile');
  // Si tocas el último activo, deselecciona. Si no, selecciona hasta ese.
  if (idx + 1 === planSelected) planSelected = Math.max(0, planSelected - 1);
  else planSelected = Math.min(idx + 1, max);
  
  const tiles = document.querySelectorAll('.q-tile');
  tiles.forEach((t, i) => {
    if (i < planSelected) t.classList.add('active');
    else t.classList.remove('active');
  });
  
  updateFeedback();
}

function updateFeedback() {
  const lvl = LEVELS[currentLvl];
  const fb = document.getElementById('feedback-box');
  const btn = document.getElementById('btn-go');
  
  if (planSelected === 0) {
    fb.className = 'feedback-msg empty'; fb.textContent = ''; btn.style.display = 'none';
  } else if (planSelected === lvl.pieces) {
    fb.className = 'feedback-msg success'; 
    fb.textContent = `¡EXCELENTE! ${planSelected}/4 es igual a ${lvl.lbl}.`;
    btn.style.display = 'block';
    // Efecto de pulso en botón
    btn.animate([{transform:'scale(1)'},{transform:'scale(1.05)'},{transform:'scale(1)'}], {duration: 600});
  } else {
    fb.className = 'feedback-msg error';
    fb.textContent = `Tienes ${planSelected}/4. Sigue ajustando para llegar a ${lvl.lbl}.`;
    btn.style.display = 'none';
  }
}

function startGameplay() {
  SFX.play('tile');
  document.getElementById('overlay').classList.remove('visible');
  if (game && game.scene.isActive('Game')) {
    game.scene.getScene('Game').startLevel(LEVELS[currentLvl], planSelected);
  }
}

/* ══════════════════════════════════════════════════════════
   4. PHASER 3 - GRÁFICOS Y LÓGICA (La Masterpiece)
══════════════════════════════════════════════════════════ */

class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }
  create() {
    this.createImmersiveTextures();
    this.scene.start('Game');
  }

  createImmersiveTextures() {
    // Generador de texturas procedurales de alta calidad.
    const mk = (key, w, h, drawFn) => {
      const g = this.make.graphics({add:false});
      drawFn(g); g.generateTexture(key, w, h); g.destroy();
    };

    // ── GLOW (Luz Aditiva)
    mk('glow', 128, 128, g => {
      // Gradiente radial falso usando círculos superpuestos
      for(let i=0; i<32; i++) {
        const alpha = 0.05 * (1 - (i/32));
        g.fillStyle(0xffffff, alpha);
        g.fillCircle(64, 64, 64 - i*2);
      }
    });

    // ── YOSHI PROFESIONAL
    // Se redibujó cuidadosamente para capturar la esencia con sombreado base
    const drawYoshi = (g, walking) => {
      const legOffset = walking ? 8 : 0;
      
      // Sombra proyectada
      g.fillStyle(0x000000, 0.3); g.fillEllipse(50, 92, 60, 12);
      
      // Bota Izquierda (Fondo)
      g.fillStyle(0x8e24aa, 1); g.fillEllipse(30 - legOffset, 80, 26, 16);
      g.fillStyle(0xab47bc, 1); g.fillEllipse(28 - legOffset, 78, 22, 12); // Brillo
      
      // Bota Derecha (Frente)
      g.fillStyle(0xd32f2f, 1); g.fillEllipse(55 + legOffset, 82, 30, 18);
      g.fillStyle(0xf44336, 1); g.fillEllipse(53 + legOffset, 79, 24, 14);
      g.fillStyle(0xffcdd2, 0.4); g.fillEllipse(48 + legOffset, 75, 10, 6); // Reflexión
      
      // Cola y Cuerpo Principal (Verde Esmeralda)
      g.fillStyle(0x1b5e20, 1); g.fillCircle(20, 60, 14); // Borde Cola
      g.fillStyle(0x2ecc71, 1); g.fillCircle(22, 58, 12); // Centro Cola
      
      g.fillStyle(0x1b5e20, 1); g.fillEllipse(48, 52, 50, 44); // Borde Cuerpo
      g.fillStyle(0x2ecc71, 1); g.fillEllipse(48, 50, 48, 42); // Cuerpo Main
      
      // Panza Blanca/Crema
      g.fillStyle(0xfff9c4, 1); g.fillEllipse(54, 52, 24, 34);
      
      // Silla de Montar (Roja)
      g.fillStyle(0xbf360c, 1); g.fillCircle(30, 32, 8); g.fillCircle(44, 26, 9);
      g.fillStyle(0xff5722, 1); g.fillCircle(29, 30, 6); g.fillCircle(43, 24, 7);
      
      // Cuello
      g.fillStyle(0x2ecc71, 1); g.fillEllipse(64, 40, 20, 26);
      
      // Cabeza Base
      g.fillStyle(0x1b5e20, 1); g.fillCircle(72, 30, 22);
      g.fillStyle(0x2ecc71, 1); g.fillCircle(72, 30, 20);
      
      // Hocico Grande (Característico)
      g.fillStyle(0xe65100, 1); g.fillEllipse(94, 38, 28, 20); // Borde/Sombra
      g.fillStyle(0xffb300, 1); g.fillEllipse(92, 36, 26, 18); // Color Main
      g.fillStyle(0xffecb3, 0.6); g.fillEllipse(90, 32, 16, 8); // Gran Brillo nariz
      
      // Fosas Nasales
      g.fillStyle(0x3e2723, 1); g.fillCircle(88, 35, 3); g.fillCircle(98, 35, 3);
      
      // Ojo Blanco Grande
      g.fillStyle(0x000000, 1); g.fillEllipse(66, 22, 22, 26); // Borde
      g.fillStyle(0xffffff, 1); g.fillEllipse(65, 22, 20, 24); // Esclerótica
      
      // Pupila (Azul muy oscuro) e Iris
      g.fillStyle(0x0a0a2a, 1); g.fillEllipse(70, 22, 10, 14);
      g.fillStyle(0xffffff, 1); g.fillCircle(72, 18, 3.5); // Catchlight primario
      g.fillStyle(0xffffff, 0.6); g.fillCircle(68, 26, 1.5); // Catchlight secundario
      
      // Párpado Verde superpuesto
      g.fillStyle(0x1b5e20, 1); g.fillEllipse(64, 11, 24, 10);
      g.fillStyle(0x2ecc71, 1); g.fillEllipse(64, 10, 22, 8);
      
      // Bracito frontal
      g.fillStyle(0x27ae60, 1); g.fillEllipse(62, 58, 12, 6);
    };
    mk('yoshi_idle', 110, 100, g => drawYoshi(g, false));
    mk('yoshi_walk', 110, 100, g => drawYoshi(g, true));

    // ── COMIDA (Altamente Detallada)
    // 1/4 Pizza
    mk('food_q', 80, 80, g => {
      const cx=40, cy=40, r=36;
      // Borde de Queso/Salsa exterior
      g.fillStyle(0xc62828, 1);
      g.beginPath(); g.moveTo(cx,cy); g.arc(cx,cy,r, Math.PI*1.5, Math.PI*2); g.closePath(); g.fillPath();
      // Queso principal
      g.fillStyle(0xffea00, 1);
      g.beginPath(); g.moveTo(cx,cy); g.arc(cx,cy,r-4, Math.PI*1.5, Math.PI*2); g.closePath(); g.fillPath();
      // Pepperonis
      g.fillStyle(0xd84315, 1); g.fillCircle(cx+16, cy-18, 6); g.fillCircle(cx+26, cy-8, 5); g.fillCircle(cx+8, cy-28, 4);
      // Highlights
      g.fillStyle(0xffffff, 0.3);
      g.beginPath(); g.moveTo(cx,cy); g.arc(cx,cy,r-10, Math.PI*1.6, Math.PI*1.9); g.closePath(); g.fillPath();
    });
    
    // 1/2 Sandía
    mk('food_h', 80, 80, g => {
      const cx=40, cy=55, r=36;
      g.fillStyle(0x1b5e20, 1); g.beginPath(); g.moveTo(cx-r,cy); g.arc(cx,cy,r, Math.PI, 0); g.closePath(); g.fillPath();
      g.fillStyle(0xe8f5e9, 1); g.beginPath(); g.moveTo(cx-r+4,cy); g.arc(cx,cy,r-4, Math.PI, 0); g.closePath(); g.fillPath();
      g.fillStyle(0xe53935, 1); g.beginPath(); g.moveTo(cx-r+7,cy); g.arc(cx,cy,r-7, Math.PI, 0); g.closePath(); g.fillPath();
      g.fillStyle(0x212121, 1); // Semillas
      [cx-15, cx, cx+15].forEach(x => g.fillEllipse(x, cy-15, 4, 8));
      [cx-8, cx+8].forEach(x => g.fillEllipse(x, cy-6, 4, 8));
      g.fillStyle(0xffffff, 0.25); g.beginPath(); g.moveTo(cx-20,cy); g.arc(cx,cy,20, Math.PI, Math.PI*1.3); g.closePath(); g.fillPath();
    });

    // ── NIDO (Con luz interna)
    mk('nest', 140, 100, g => {
      g.fillStyle(0x000000, 0.4); g.fillEllipse(70, 90, 120, 16); // Sombra
      g.fillStyle(0x4e342e, 1); g.fillEllipse(70, 75, 110, 34); // Bowl exterior
      g.fillStyle(0x3e2723, 1); g.fillEllipse(70, 70, 96, 26); // Hueco interior oscuro
      // Huevos
      g.fillStyle(0xf1f8e9, 1); g.fillEllipse(60, 50, 20, 26); g.fillEllipse(80, 55, 18, 24);
      g.fillStyle(0x4caf50, 1); g.fillCircle(60, 45, 4); g.fillCircle(82, 52, 3); // Manchas
      // Paja delantera
      g.fillStyle(0x795548, 1);
      for(let i=0; i<16; i++) { g.fillTriangle(10+i*8, 85, 18+i*8, 85, 14+i*8 + (Math.random()*10-5), 50 + Math.random()*20); }
    });

    // Partículas
    mk('particle', 16, 16, g => {
      g.fillStyle(0xffffff, 1); g.fillCircle(8, 8, 8);
    });
    mk('cloud', 200, 80, g => {
      g.fillStyle(0xffffff, 1);
      g.fillCircle(50, 40, 30); g.fillCircle(100, 30, 40); g.fillCircle(150, 45, 25);
    });
  }
}

class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    this.createEnvironment();
    this.createHUD();
    this.createEntities();
    this.setupInput();

    // Estado local
    this.isPaused = true;
    this.collectedVal = 0;
    this.targetVal = 0;
  }

  createEnvironment() {
    // Cielo gradiente (Sunset inmersivo)
    const sky = this.add.graphics();
    sky.fillGradientStyle(0x1a2a6c, 0x1a2a6c, 0xb21f1f, 0xfdbb2d, 1);
    sky.fillRect(0, 0, GW, GH);
    
    // Nubes Parallax
    this.clouds = [];
    for(let i=0; i<3; i++) {
      const c = this.add.image(Math.random()*GW, 50 + Math.random()*150, 'cloud')
        .setAlpha(0.6).setScale(0.5 + Math.random()*0.5);
      this.clouds.push(c);
    }

    // Suelo
    const ground = this.add.graphics();
    ground.fillGradientStyle(0x1b5e20, 0x1b5e20, 0x0a1c0a, 0x0a1c0a, 1);
    ground.fillRect(0, 300, GW, GH-300);
    // Borde de pasto
    ground.fillStyle(0x2ecc71, 1); ground.fillRect(0, 300, GW, 6);
  }

  createHUD() {
    // Zona Superior (Info)
    const topBar = this.add.graphics().setDepth(100);
    topBar.fillStyle(0x000000, 0.4); topBar.fillRoundedRect(10, 10, GW-20, 50, 16);
    
    this.hudGoal = this.add.text(GW/2, 35, 'Meta: 0/4', {
      fontFamily: 'Baloo 2', fontSize: '24px', fontStyle: '800', color: '#ffd740', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5).setDepth(101);

    // Controles Inferiores Visuales
    this.add.text(GW/2, GH - 20, 'Arrastra para mover', {
      fontFamily: 'Baloo 2', fontSize: '14px', color: 'rgba(255,255,255,0.4)'
    }).setOrigin(0.5).setDepth(10);
  }

  createEntities() {
    // Nido de Entrega
    this.nestX = GW/2; this.nestY = 360;
    this.nest = this.add.image(this.nestX, this.nestY, 'nest').setDepth(20);
    
    // Luz volumétrica sobre el nido (invisible al inicio)
    this.nestLight = this.add.image(this.nestX, this.nestY - 150, 'glow')
      .setDisplaySize(150, 400).setTint(0x2ecc71).setAlpha(0)
      .setBlendMode('ADD').setDepth(19);

    // Yoshi
    this.yoshi = this.physics.add.sprite(GW/2, GH - 150, 'yoshi_idle').setDepth(30).setSize(40, 40).setOffset(35, 50);
    this.yoshi.setCollideWorldBounds(true);
    this.physics.world.setBounds(10, 300, GW-20, GH-310);
    
    // Animación procedural de Yoshi (Bobbing)
    this.yoshiBob = this.tweens.add({
      targets: this.yoshi, y: '+=6', duration: 150, yoyo: true, repeat: -1, ease: 'Sine.inOut'
    });
    this.yoshiBob.pause();

    // Partículas de polvo
    this.dustGrp = this.add.particles(0,0,'particle', {
      scale: {start:0.5, end:0}, alpha: {start:0.4, end:0},
      lifespan: 400, speed: 20, emitting: false, tint: 0x4caf50
    }).setDepth(29);

    // Grupo de comida
    this.foodGroup = this.physics.add.group();
    
    // Colisión Core: Yoshi vs Food
    this.physics.add.overlap(this.yoshi, this.foodGroup, this.onCollect, null, this);
  }

  setupInput() {
    this.input.addPointer(2);
    
    // Movimiento con toque
    this.input.on('pointermove', (ptr) => {
      if(this.isPaused || !ptr.isDown) return;
      // Mover hacia el puntero con suavidad
      this.physics.moveToObject(this.yoshi, {x: ptr.x, y: ptr.y - 40}, 280);
    });

    this.input.on('pointerup', () => {
      this.yoshi.setVelocity(0,0);
    });

    // Teclado backup
    this.keys = this.input.keyboard.createCursorKeys();
  }

  /* ── FLUJO DEL NIVEL ── */
  startLevel(lvlObj, playerPlanQty) {
    this.isPaused = false;
    this.targetVal = lvlObj.tgt;
    this.collectedVal = 0;
    
    this.hudGoal.setText(`Meta: ${lvlObj.lbl}`);
    this.hudGoal.setColor('#ffd740');
    this.nestLight.setAlpha(0);

    // Reset Yoshi
    this.yoshi.setPosition(GW/2, GH-100);
    this.yoshi.setVelocity(0,0);
    
    // Limpieza ESTRICTA de comida anterior (Arregla Bug 1)
    if (this.foodObjs) {
      this.foodObjs.forEach(f => {
        if(f.glow) f.glow.destroy();
        if(f.lbl) f.lbl.destroy();
        f.sprite.destroy();
      });
    }
    this.foodGroup.clear(true, true);
    this.foodObjs = []; // Array manual para sincronizar gráficos visuales en update() sin containers físicos complejos

    // Spawn nuevo
    const spawnFoodObj = (val, tex, labelStr) => {
      // Intentar spawn lejos de yoshi y nido
      let px, py, valid = false;
      for(let i=0; i<20; i++){
        px = Phaser.Math.Between(50, GW-50); py = Phaser.Math.Between(450, GH-150);
        if (Math.hypot(px-this.nestX, py-this.nestY) > 120) { valid = true; break; }
      }
      if(!valid) return;

      // 1. Crear Physics Sprite real
      const bodySprite = this.foodGroup.create(px, py, tex).setAlpha(0);
      bodySprite.setSize(20, 20); // Hitbox ENANO, requiere mucha precisión (Arregla Bug 2)
      bodySprite.setData('val', val);
      bodySprite.setData('lblStr', labelStr);
      bodySprite.collected = false;

      // 2. Gráficos visuales acoplados
      const visual = this.add.image(px, py, tex).setDisplaySize(60,60).setDepth(25);
      const glow = this.add.image(px, py, 'glow').setBlendMode('ADD').setTint(val===0.5?0x2ecc71:0xffd740).setDepth(24).setAlpha(0.4);
      const lbl = this.add.text(px, py-40, labelStr, { fontFamily:'Baloo 2', fontSize:'18px', fontStyle:'800', stroke:'#000', strokeThickness:4}).setOrigin(0.5).setDepth(26);

      // Tween de flotación en el visual
      this.tweens.add({
        targets: visual, y: py - 12, duration: 1000 + Math.random()*500, yoyo: true, repeat: -1, ease: 'Sine.inOut'
      });

      this.foodObjs.push({ sprite: bodySprite, visual, glow, lbl, baseX: px, baseY: py });
    };

    for(let i=0; i<lvlObj.fQ; i++) spawnFoodObj(0.25, 'food_q', '1/4');
    for(let i=0; i<lvlObj.fH; i++) spawnFoodObj(0.50, 'food_h', '1/2');
    
    // Zoom in FX
    this.cameras.main.setZoom(1.1);
    this.tweens.add({targets: this.cameras.main, zoom: 1, duration: 600, ease: 'Cubic.out'});
  }

  /* ── COLECCIÓN Y JUICE (Hit-stop, Lengua, Sparks) ── */
  onCollect(yoshi, bodySprite) {
    if (this.isPaused || bodySprite.collected) return;
    bodySprite.collected = true; // Prevenir multi-colisión
    
    // Encontrar objetos visuales asociados
    const fObj = this.foodObjs.find(o => o.sprite === bodySprite);
    if (!fObj) return;

    this.isPaused = true;
    yoshi.setVelocity(0,0);
    this.yoshiBob.pause();
    
    SFX.play('pop');
    
    // Time stop / Screen shake suave
    this.cameras.main.shake(80, 0.005);

    // Animación de Lengua (Juice puro)
    const tongue = this.add.graphics().setDepth(28);
    const yx = yoshi.x + (yoshi.flipX ? -25 : 25);
    const yy = yoshi.y - 15;
    
    this.tweens.addCounter({
      from: 0, to: 1, duration: 50,
      onUpdate: (tw) => {
        tongue.clear(); tongue.lineStyle(8, 0xff5252, 1);
        tongue.strokeLineShape(new Phaser.Geom.Line(yx, yy, 
          Phaser.Math.Linear(yx, fObj.visual.x, tw.getValue()), 
          Phaser.Math.Linear(yy, fObj.visual.y, tw.getValue())
        ));
      },
      onComplete: () => {
        // Eliminar Visuales
        fObj.visual.destroy(); fObj.glow.destroy(); fObj.lbl.destroy();
        bodySprite.destroy();
        
        // Texto Flotante
        const ft = this.add.text(yx, yy-30, `+${bodySprite.getData('lblStr')}`, {fontFamily:'Baloo 2', fontSize:'24px', color:'#2ecc71', fontStyle:'800', stroke:'#000', strokeThickness:5}).setOrigin(0.5).setDepth(50);
        this.tweens.add({targets: ft, y: yy-80, alpha: 0, duration: 800, onComplete:()=>ft.destroy()});
        
        // Sparks
        const sp = this.add.particles(yx, yy, 'particle', { speed: 80, scale: {start:0.5, end:0}, lifespan: 300, quantity: 8, tint: 0xffd740 }).setDepth(40);
        this.time.delayedCall(400, () => sp.destroy());

        // Retraer lengua
        this.tweens.addCounter({
          from: 1, to: 0, duration: 50,
          onUpdate: (tw) => {
            tongue.clear(); tongue.lineStyle(8, 0xff5252, 1);
            tongue.strokeLineShape(new Phaser.Geom.Line(yx, yy, 
              Phaser.Math.Linear(yx, fObj.baseX, tw.getValue()), 
              Phaser.Math.Linear(yy, fObj.baseY, tw.getValue())
            ));
          },
          onComplete: () => {
            tongue.destroy();
            this.isPaused = false;
            
            // Lógica Matemática
            this.collectedVal = Math.round((this.collectedVal + bodySprite.getData('val')) * 1000) / 1000;
            this.checkStatus();
          }
        });
      }
    });
  }

  checkStatus() {
    const diff = this.targetVal - this.collectedVal;
    const txtC = this.collectedVal === 0 ? '0' : this.collectedVal.toString();
    this.hudGoal.setText(`Llevas: ${txtC}  |  Meta: ${LEVELS[currentLvl].lbl}`);

    if (Math.abs(diff) < 0.001) {
      // MATCH EXACTO! Encender nido
      this.hudGoal.setColor('#2ecc71');
      this.hudGoal.setText('¡PERFECTO! Llévalo al nido ▲');
      this.tweens.add({targets: this.nestLight, alpha: 0.8, duration: 400, yoyo: true, repeat: -1});
    } else if (diff < 0) {
      // TE PASASTE
      this.isPaused = true;
      this.yoshi.setVelocity(0,0);
      SFX.play('error');
      this.cameras.main.shake(400, 0.02);
      this.cameras.main.flash(200, 255, 0, 0);
      this.hudGoal.setColor('#ff5252');
      this.hudGoal.setText('¡Te pasaste! Dolor de panza 🤢');
      
      this.time.delayedCall(1500, () => {
        // Reiniciar nivel
        this.startLevel(LEVELS[currentLvl], planSelected);
      });
    }
  }

  /* ── UPDATE LOOP ── */
  update() {
    // Scroll Nubes
    this.clouds.forEach(c => {
      c.x -= 0.2;
      if(c.x < -100) c.x = GW + 100;
    });

    if (this.isPaused) {
      this.yoshi.setTexture('yoshi_idle');
      return;
    }

    // Teclado fallback
    if(this.keys.left.isDown) this.yoshi.setVelocityX(-200);
    else if(this.keys.right.isDown) this.yoshi.setVelocityX(200);
    if(this.keys.up.isDown) this.yoshi.setVelocityY(-200);
    else if(this.keys.down.isDown) this.yoshi.setVelocityY(200);

    const speed = Math.hypot(this.yoshi.body.velocity.x, this.yoshi.body.velocity.y);
    
    // Orientación
    if (this.yoshi.body.velocity.x < -10) this.yoshi.setFlipX(true);
    else if (this.yoshi.body.velocity.x > 10) this.yoshi.setFlipX(false);

    // Animación de Caminata
    if (speed > 10) {
      this.yoshi.setTexture('yoshi_walk');
      if(!this.yoshiBob.isPlaying()) this.yoshiBob.resume();
      this.dustGrp.emitParticleAt(this.yoshi.x, this.yoshi.y + 15);
    } else {
      this.yoshi.setTexture('yoshi_idle');
      this.yoshiBob.pause();
    }

    // Sincronizar gráficos de comida activos
    this.foodObjs.forEach(f => {
      if(f.sprite.active) {
        f.glow.setPosition(f.visual.x, f.visual.y);
        f.lbl.setPosition(f.visual.x, f.visual.y - 40);
      }
    });

    // Validar entrega en el Nido
    if (Math.abs(this.targetVal - this.collectedVal) < 0.001) {
      const distToNest = Math.hypot(this.yoshi.x - this.nestX, this.yoshi.y - this.nestY);
      if (distToNest < 60) {
        this.winLevel();
      }
    }
  }

  winLevel() {
    this.isPaused = true;
    this.yoshi.setVelocity(0,0);
    SFX.play('win');
    
    // Destello verde intenso
    this.cameras.main.flash(400, 46, 204, 113);
    this.hudGoal.setText('¡NIVEL COMPLETADO! 🎉');
    
    // Confetti masivo
    const emit = this.add.particles(GW/2, GH, 'particle', {
      speed: {min: 300, max: 600}, angle: {min: 240, max: 300},
      gravityY: 800, scale: {start: 0.8, end: 0}, lifespan: 2000,
      tint: [0x2ecc71, 0xffd740, 0xff5252, 0x4fc3f7], quantity: 3
    }).setDepth(200);
    
    this.time.delayedCall(500, () => emit.stop());

    this.time.delayedCall(2500, () => {
      currentLvl = (currentLvl + 1) % LEVELS.length;
      loadLevelUI();
    });
  }
}

function initPhaser() {
  game = new Phaser.Game({
    type: Phaser.AUTO,
    parent: 'game-container',
    transparent: true,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: GW, height: GH },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [BootScene, GameScene]
  });
}
